{% extends "base.html" %}

{% block title %}Add Patient{% endblock %}

{% block content %}
<br><br><br><br><br><br>

<section id="add-patient-page" class="section">
    <div class="container" data-aos="fade-up">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="add-patient-wrapper">

                    <div class="add-patient-header text-center" data-aos="fade-up" data-aos-delay="100">
                        <h2>Add New Patient</h2>
                        <p>Fill in the patient information to create a new record.</p>
                    </div>

                    <div class="add-patient-icon" data-aos="zoom-in" data-aos-delay="200">
                        <i class="bi bi-person-plus"></i>
                    </div>
                    {% if error_message %}
                    <div class="alert alert-danger text-center" role="alert">
                        {{ error_message }}
                    </div>
                    {% endif %}

                    <form id="add-patient-form" method="POST" data-aos="fade-up" data-aos-delay="300">
                        <div class="row gy-4">
                            <div class="col-md-4">
                                <label for="title" class="form-label">Title</label>
                                <select name="title" class="form-select" required="">
                                    <option value="">Select a Title</option>
                                    <option value="mr">Mr</option>
                                    <option value="ms">Ms</option>
                                    <option value="dr">Dr</option>
                                    <option value="mrs">Mrs</option>
                                    <option value="miss">Miss</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label for="first_name" class="form-label">First Name</label>
                                <input type="text" id="first_name" name="first_name" class="form-control"
                                    placeholder="Enter first name" required>
                            </div>

                            <div class="col-md-4">
                                <label for="last_name" class="form-label">Last Name</label>
                                <input type="text" id="last_name" name="last_name" class="form-control"
                                    placeholder="Enter last name" required>
                            </div>

                            <div class="col-md-12">
                                <label for="preferred_first_name" class="form-label">Preferred First Name</label>
                                <input type="text" id="preferred_first_name" name="preferred_first_name"
                                    class="form-control" placeholder="Enter preferred first name">
                            </div>
                            <div class="col-md-12">
                                <label for="date_of_birth" class="form-label">Date Of Birth</label>
                                <input type="date" id="date_of_birth" name="date_of_birth" class="form-control"
                                    required="">
                            </div>

                            <div class="col-md-12">
                                <label for="gender" class="form-label">Gender</label>
                                <select id="gender" name="gender" class="form-select" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="text" id="phone" name="phone" class="form-control"
                                    placeholder="Enter phone number">
                            </div>

                            <div class="col-md-12">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" name="email" class="form-control"
                                    placeholder="Enter email address">
                            </div>

                            <div class="col-md-12">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" id="address" name="address" class="form-control"
                                    placeholder="Enter address">
                            </div>

                            <div class="col-md-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" id="city" name="city" class="form-control" placeholder="Enter city">
                            </div>

                            <div class="col-md-3">
                                <label for="state" class="form-label">State</label>
                                <input type="text" id="state" name="state" class="form-control"
                                    placeholder="Enter state">
                            </div>

                            <div class="col-md-3">
                                <label for="post_code" class="form-label">Post Code</label>
                                <input type="text" id="post_code" name="post_code" class="form-control"
                                    placeholder="Enter post code">
                            </div>

                            <div class="col-md-3">
                                <label for="country" class="form-label">Country</label>
                                <input type="text" id="country" name="country" class="form-control"
                                    placeholder="Enter country">
                            </div>

                            <div class="col-12">
                                <label for="notes" class="form-label">Notes</label>
                                <textarea id="notes" name="notes" class="form-control" rows="5"
                                    placeholder="Add any notes about the patient"></textarea>
                            </div>
                            <div class="col-12">
                                <label for="medical_information" class="form-label">Medical Information</label>
                                <textarea id="medical_information" name="medical_information" class="form-control"
                                    rows="5" placeholder="Add any medical information about the patient"></textarea>
                            </div>
                            <div class="col-12">
                                <label for="appointment_notes" class="form-label">Appointment Notes</label>
                                <textarea id="appointment_notes" name="appointment_notes" class="form-control" rows="5"
                                    placeholder="Add any notes about the patient's appointment"></textarea>
                            </div>
                            <div class="col-md-4">
                                <label for="occupation" class="form-label">Occupation</label>
                                <input type="text" id="occupation" name="occupation" class="form-control"
                                    placeholder="Enter occupation">
                            </div>
                            <div class="col-md-4">
                                <label for="emergency_contact" class="form-label">Emergency Contact</label>
                                <input type="text" id="emergency_contact" name="emergency_contact" class="form-control"
                                    placeholder="Enter emergency contact">
                            </div>
                            <div class="col-md-4">
                                <label for="medicare_number" class="form-label">Medicare Number</label>
                                <input type="text" id="medicare_number" name="medicare_number" class="form-control"
                                    placeholder="Enter medicare number">
                            </div><br>

                            <div class="col-12 text-center pt-2">
                                <button type="submit" class="save-patient-btn">Save Patient</button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</section>


{% endblock %}
