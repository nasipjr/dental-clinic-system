{% extends "base.html" %}

{% block title %}Add Appointment{% endblock %}

{% block content %}
<br><br><br><br><br><br>


<section id="add-patient-page" class="section">
    <div class="container" data-aos="fade-up">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="add-patient-wrapper">

                    <div class="add-patient-header text-center" data-aos="fade-up" data-aos-delay="100">
                        <h2>Add New Appointment</h2>
                        <p>Fill in the appointment information to create a new record.</p>
                    </div>

                    <div class="add-patient-icon" data-aos="zoom-in" data-aos-delay="200">
                        <i class="bi bi-calendar-event"></i>
                    </div>

                    <form id="add-patient-form" method="POST" data-aos="fade-up" data-aos-delay="300">
                        <div class="col-md-12">
                            <label for="appointment_date" class="form-label">Date Of Appointment</label>
                            <input type="datetime-local" id="appointment_date" name="appointment_date"
                                class="form-control" required>
                        </div><br>

                        <div class="col-md-12">
                            <label for="reason" class="form-label">Reason</label>
                            <select id="reason" name="reason" class="form-select" required>
                                <option value="">Select a Reason</option>
                                <option value="Check-up">Check-up</option>
                                <option value="Cleaning">Cleaning</option>
                                <option value="Filling">Filling</option>
                                <option value="Root Canal">Root Canal</option>
                                <option value="Extraction">Extraction</option>
                                <option value="Crown / Bridge">Crown / Bridge</option>
                                <option value="Braces / Orthodontics">Braces / Orthodontics</option>
                                <option value="Whitening">Whitening</option>
                                <option value="Emergency Pain">Emergency Pain</option>
                                <option value="Follow-up">Follow-up</option>
                            </select>
                        </div><br>

                        <div class="col-md-12">
                            <label class="form-label">Status</label>
                            <div class="form-control readonly-status-field">
                                Scheduled
                            </div>
                        </div><br>


                        <div class="col-12 text-center pt-2">
                            <button type="submit" class="save-patient-btn">Save Appointment</button>
                            <a href="{{ url_for('patient_detail', patient_id=patient.id) }}"
                                class="btn-outline-main ms-2">
                                Cancel
                            </a>
                        </div>
                </div>
                </form>

            </div>
        </div>
    </div>
    </div>
</section>
{% endblock %}
