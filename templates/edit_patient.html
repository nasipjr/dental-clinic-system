{% extends "base.html" %}

{% block title %}Edit Patient{% endblock %}

{% block content %}
    <h1>Edit Patient</h1>

    <form method="POST">
        <div class="form-group">
            <label for="full_name">Full Name:</label>
            <input type="text" id="full_name" name="full_name" value="{{ patient.full_name }}" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" value="{{ patient.phone }}">
        </div>

        <div class="form-group">
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" value="{{ patient.address }}">
        </div>

        <div class="form-group">
            <label for="notes">Notes:</label>
            <textarea id="notes" name="notes">{{ patient.notes }}</textarea>
        </div>

        <button type="submit">Update Patient</button>
    </form>
{% endblock %}
