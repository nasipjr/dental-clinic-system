{% extends "base.html" %}

{% block title %}Add Payment{% endblock %}

{% block content %}
<br><br><br><br><br><br>

<section id="add-patient-page" class="section">
    <div class="container" data-aos="fade-up">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="add-patient-wrapper">

                    <div class="add-patient-header text-center" data-aos="fade-up" data-aos-delay="100">
                        <h2>Add New Payment</h2>
                        <p>Record a payment on the patient profile. The system will apply it to the oldest unpaid invoices automatically.</p>
                    </div>

                    <div class="add-patient-icon" data-aos="zoom-in" data-aos-delay="200">
                        <i class="bi bi-cash-coin"></i>
                    </div>

                    {% if error_message %}
                    <div class="alert alert-danger text-center" role="alert">
                        {{ error_message }}
                    </div>
                    {% endif %}

                    <form id="add-patient-form" method="POST" data-aos="fade-up" data-aos-delay="300">
                        <div class="row gy-4">

                            <div class="col-md-12">
                                <label for="patient_id" class="form-label">Patient</label>
                                <select id="patient_id" name="patient_id" class="form-select" required>
                                    <option value="">Select Patient</option>

                                    {% for patient in patients %}
                                    <option value="{{ patient.id }}"
                                        {% if selected_patient_id and selected_patient_id == patient.id %}selected{% endif %}>
                                        {{ patient.first_name }} {{ patient.last_name }}
                                        {% if patient.phone %} - {{ patient.phone }}{% endif %}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-12">
                                <label for="payment_amount" class="form-label">Payment Amount</label>
                                <input
                                    type="number"
                                    step="0.01"
                                    min="0.01"
                                    id="payment_amount"
                                    name="payment_amount"
                                    class="form-control"
                                    placeholder="Enter payment amount"
                                    required
                                >
                            </div>

                            <div class="col-md-12">
                                <label for="notes" class="form-label">Payment Notes</label>
                                <textarea
                                    id="notes"
                                    name="notes"
                                    class="form-control"
                                    rows="3"
                                    placeholder="Optional notes about this payment"
                                ></textarea>
                            </div>

                            <div class="col-12">
                                <div class="action-buttons justify-content-center gap-3">
                                    <button type="submit" class="btn btn-primary px-4">
                                        Save Payment
                                    </button>

                                    <a href="{{ url_for('payments') }}" class="btn-outline-main px-4">
                                        Cancel
                                    </a>
                                </div>
                            </div>

                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
