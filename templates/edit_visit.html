{% extends "base.html" %}

{% block title %}Edit Visit{% endblock %}

{% block content %}
    <h1>Edit Visit</h1>

    <form method="POST">
        <div class="form-group">
            <label for="visit_date">Visit Date:</label>
            <input type="text" id="visit_date" name="visit_date" value="{{ visit.visit_date }}" required>
        </div>

        <div class="form-group">
            <label for="procedure_type">Procedure Type:</label>
            <input type="text" id="procedure_type" name="procedure_type" value="{{ visit.procedure_type }}">
        </div>

        <div class="form-group">
            <label for="tooth_number">Tooth Number:</label>
            <input type="text" id="tooth_number" name="tooth_number" value="{{ visit.tooth_number }}">
        </div>

        <div class="form-group">
            <label for="notes">Notes:</label>
            <textarea id="notes" name="notes">{{ visit.notes }}</textarea>
        </div>

        <div class="form-group">
            <label for="total_cost">Total Cost:</label>
            <input type="number" step="0.01" id="total_cost" name="total_cost" value="{{ visit.total_cost }}">
        </div>

        <div class="form-group">
            <label for="paid_amount">Paid Amount:</label>
            <input type="number" step="0.01" id="paid_amount" name="paid_amount" value="{{ visit.paid_amount }}">
        </div>

        <button type="submit">Update Visit</button>
    </form>
{% endblock %}
