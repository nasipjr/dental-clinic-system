{% extends "base.html" %}

{% block title %}Payments{% endblock %}

{% block content %}
<br><br><br><br><br><br><br>

<!-- Section Title -->
<div class="container section-title" data-aos="fade-up">
    <h2>Payments</h2>
    <p>All patient payments recorded in the clinic.</p>
</div>
<!-- End Section Title -->


<section id="payments-section" class="find-a-doctor section">
    <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
            <div>
                <h2 class="mb-2">Payments List</h2>
                <p class="mb-0">Manage all clinic payments from one place.</p>
            </div>

            <a href="{{ url_for('payments.add_patient_payment') }}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>
                Add New Payment
            </a>
        </div>

        <div class="appointments-table-wrapper mb-4">
            <form id="payments-filter-form" method="GET" action="{{ url_for('payments.payments_table') }}">
                <div class="row gy-3 align-items-end">

                    <div class="col-lg-7 col-md-8">
                        <label for="search" class="form-label">Search Payments</label>
                        <input
                            type="text"
                            id="search"
                            name="search"
                            class="form-control"
                            placeholder="Search by patient, phone, payment number, date, amount, or notes"
                            value="{{ search_query }}"
                        >
                    </div>

                    <input type="hidden" name="sort" value="{{ sort_by }}">
                    <input type="hidden" name="order" value="{{ order }}">

                    <div class="col-lg-5 col-md-4 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search me-1"></i>
                            Search
                        </button>

                        <a href="{{ url_for('payments.payments') }}" class="btn btn-outline-light reset-filter-btn">
                            Reset
                        </a>
                    </div>

                </div>
            </form>
        </div>

        <div id="payments-table-container">
            {% include "partials/_payments_table.html" %}
        </div>

    </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const tableContainer = document.getElementById("payments-table-container");
    const filterForm = document.getElementById("payments-filter-form");

    function loadPaymentsTable(url) {
        fetch(url, {
            headers: {
                "X-Requested-With": "XMLHttpRequest"
            }
        })
        .then(function (response) {
            if (!response.ok) {
                throw new Error("Failed to load payments table.");
            }
            return response.text();
        })
        .then(function (html) {
            tableContainer.innerHTML = html;
            if (window.initCustomTooltips) {
                window.initCustomTooltips();
            }
        })
        .catch(function (error) {
            console.error(error);
            window.location.href = url;
        });
    }

    if (filterForm) {
        filterForm.addEventListener("submit", function (event) {
            event.preventDefault();

            const formData = new FormData(filterForm);
            const queryString = new URLSearchParams(formData).toString();
            const url = filterForm.getAttribute("action") + "?" + queryString;

            loadPaymentsTable(url);
        });
    }

    document.addEventListener("click", function (event) {
        const link = event.target.closest(".payments-ajax-link");

        if (!link) {
            return;
        }

        event.preventDefault();
        loadPaymentsTable(link.href);
    });
});
</script>

{% endblock %}
