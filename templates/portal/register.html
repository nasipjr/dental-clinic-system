{% extends "portal/base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-7">
    <div class="card shadow-lg border-0 rounded-4 my-4" style="background: var(--surface-color);">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 70px; height: 70px;">
            <i class="bi bi-person-plus fs-1"></i>
          </div>
          <h3 class="card-title fw-bold">Register</h3>
          <p class="text-secondary small">Create your account below to link it to your patient record</p>
        </div>
        
        <form method="POST" action="{{ url_for('portal.register') }}">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="username" class="form-label settings-label">Username</label>
              <input type="text" class="form-control settings-input" id="username" name="username" required placeholder="Enter username">
            </div>
            <div class="col-md-6">
              <label for="password" class="form-label settings-label">Password</label>
              <input type="password" class="form-control settings-input" id="password" name="password" required placeholder="Enter password (min 6 chars)">
            </div>
            
            <div class="col-md-6">
              <label for="first_name" class="form-label settings-label">First Name</label>
              <input type="text" class="form-control settings-input" id="first_name" name="first_name" required placeholder="First Name">
            </div>
            <div class="col-md-6">
              <label for="last_name" class="form-label settings-label">Last Name</label>
              <input type="text" class="form-control settings-input" id="last_name" name="last_name" required placeholder="Last Name">
            </div>
            
            <div class="col-md-6">
              <label for="email" class="form-label settings-label">Email Address</label>
              <input type="email" class="form-control settings-input" id="email" name="email" required placeholder="Email Address">
            </div>
            <div class="col-md-6">
              <label for="phone" class="form-label settings-label">Phone Number</label>
              <input type="text" class="form-control settings-input" id="phone" name="phone" required placeholder="Phone Number">
            </div>
            
            <div class="col-md-6">
              <label for="date_of_birth" class="form-label settings-label">Date of Birth</label>
              <input type="date" class="form-control settings-input" id="date_of_birth" name="date_of_birth" required>
            </div>
            <div class="col-md-6">
              <label for="gender" class="form-label settings-label">Gender</label>
              <select class="form-select settings-input" id="gender" name="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2.5 fw-bold shadow-sm mt-4">
            <i class="bi bi-person-check-fill me-1"></i> Register
          </button>
        </form>
        
        <div class="text-center mt-4">
          <span class="text-secondary small">Already have an account?</span>
          <a href="{{ url_for('portal.login') }}" class="small ms-1 fw-bold text-decoration-none">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
