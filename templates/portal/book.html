{% extends "portal/base.html" %}

{% block content %}
<!-- FullCalendar Integration -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
    /* Styling for disabled cells in the calendar */
    .fc-day-disabled {
        cursor: not-allowed !important;
        background-color: rgba(100, 116, 139, 0.07) !important;
    }
    
    td.fc-day-past {
        background-color: rgba(100, 116, 139, 0.07) !important;
        cursor: not-allowed !important;
    }
    
    /* FullCalendar overrides */
    .fc {
        background: var(--surface-color) !important;
        color: var(--default-color) !important;
        border-radius: 20px !important;
        padding: 24px !important;
        border: 1px solid color-mix(in srgb, var(--accent-color), transparent 85%) !important;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05) !important;
        font-family: var(--default-font) !important;
    }
    
    .fc-theme-standard td,
    .fc-theme-standard th {
        border: 1px solid color-mix(in srgb, var(--default-color), transparent 85%) !important;
    }
    
    .fc-col-header-cell {
        background: color-mix(in srgb, var(--default-color), transparent 95%) !important;
        padding: 14px 0 !important;
        color: var(--heading-color) !important;
        font-weight: 700 !important;
        border-bottom: 2px solid color-mix(in srgb, var(--default-color), transparent 85%) !important;
    }
    
    .fc-col-header-cell-cushion {
        color: var(--heading-color) !important;
        text-decoration: none !important;
        font-size: 0.95rem;
    }
    
    .fc-daygrid-day-number {
        color: color-mix(in srgb, var(--default-color), transparent 25%) !important;
        font-weight: 600 !important;
        padding: 8px 10px !important;
        text-decoration: none !important;
        font-size: 0.9rem;
    }
    
    .fc-daygrid-day:not(.fc-day-disabled):not(.fc-day-past) {
        cursor: pointer !important;
    }
    .fc-daygrid-day:not(.fc-day-disabled):not(.fc-day-past):hover {
        background-color: color-mix(in srgb, var(--accent-color), transparent 94%) !important;
        transition: background-color 0.2s ease;
    }
    
    .fc-timegrid-col:not(.fc-day-disabled):not(.fc-day-past) {
        cursor: pointer !important;
    }
    
    .fc-day-today {
        background: color-mix(in srgb, var(--accent-color), transparent 92%) !important;
    }
    
    .fc-day-today .fc-daygrid-day-number {
        color: var(--accent-color) !important;
        font-weight: 800 !important;
    }
    
    .fc-timegrid-slot {
        height: 3.5rem !important;
        border-bottom: 1px solid color-mix(in srgb, var(--default-color), transparent 88%) !important;
    }
    
    .fc-timegrid-slot-minor {
        border-bottom-style: dotted !important;
    }
    
    .fc-timegrid-slot-label-cushion {
        color: var(--default-color) !important;
        font-weight: 600 !important;
        font-size: 0.85rem !important;
    }
</style>

<div class="container section-title" data-aos="fade-up">
    <h2>Book an Appointment</h2>
    <p>Select a date and time slot from the calendar below. Blocked slots are marked as "Reserved".</p>
</div>

<div class="row justify-content-center">
  <div class="col-12 px-md-5 mb-5" style="max-width: 1400px;">
    <div id="calendar-wrapper">
        <div id="calendar"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const calendarEl = document.getElementById("calendar");
    if (!calendarEl) return;

    const workingHoursStart = "{{ working_hours_start }}";
    const workingHoursEnd = "{{ working_hours_end }}";
    const workingDays = "{{ working_days }}".split(",").map(Number);

    const startParts = workingHoursStart ? workingHoursStart.split(':') : ["09", "00"];
    const endParts = workingHoursEnd ? workingHoursEnd.split(':') : ["17", "00"];
    const startHrs = parseInt(startParts[0], 10) || 9;
    const startMins = parseInt(startParts[1], 10) || 0;
    const endHrs = parseInt(endParts[0], 10) || 17;
    const endMins = parseInt(endParts[1], 10) || 0;

    const slotMinTime = `${String(startHrs).padStart(2, '0')}:${String(startMins).padStart(2, '0')}:00`;
    let maxHrs = endHrs;
    let maxMins = endMins + 30;
    if (maxMins >= 60) {
        maxHrs += 1;
        maxMins -= 60;
    }
    const slotMaxTime = `${String(maxHrs).padStart(2, '0')}:${String(maxMins).padStart(2, '0')}:00`;

    const currentLang = document.documentElement.getAttribute('lang') || 'en';
    const isArabic = currentLang === 'ar';

    const reasons = {{ reasons | tojson }};

    const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: currentLang === 'ar' ? 'ar' : 'en',
        direction: currentLang === 'ar' ? 'rtl' : 'ltr',
        buttonText: {
            today: isArabic ? 'اليوم' : 'Today',
            month: isArabic ? 'شهر' : 'Month',
            week: isArabic ? 'أسبوع' : 'Week',
            day: isArabic ? 'يوم' : 'Day',
            list: isArabic ? 'قائمة' : 'List'
        },
        initialView: 'timeGridWeek',
        allDaySlot: false,
        slotMinTime: slotMinTime,
        slotMaxTime: slotMaxTime,
        eventTimeFormat: {
            hour: 'numeric',
            minute: '2-digit',
            meridiem: 'short',
            hour12: true
        },
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'timeGridWeek,dayGridMonth'
        },
        events: '/portal/events',
        eventDataTransform: function(eventData) {
            if (isArabic && eventData.title === 'Reserved') {
                eventData.title = 'محجوز';
            }
            return eventData;
        },
        datesSet: function (info) {
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const maxDate = new Date(todayStart);
            maxDate.setDate(maxDate.getDate() + 30);
            
            const dateEls = document.querySelectorAll('[data-date]');
            dateEls.forEach(el => {
                const dateStr = el.getAttribute('data-date');
                if (!dateStr) return;
                
                const parts = dateStr.split('-');
                if (parts.length !== 3) return;
                const date = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                const dateStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                
                const dayOfWeek = date.getDay();
                const isHoliday = !workingDays.includes(dayOfWeek);
                const isPast = dateStart < todayStart;
                const isFutureLimit = dateStart > maxDate;
                
                if (isHoliday || isPast || isFutureLimit) {
                    el.classList.add('fc-day-disabled');
                } else {
                    el.classList.remove('fc-day-disabled');
                }
            });
        },
        dateClick: function (info) {
            const clickedDate = info.date;
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const clickedDateStart = new Date(clickedDate.getFullYear(), clickedDate.getMonth(), clickedDate.getDate());
            
            const dayOfWeek = clickedDate.getDay();
            
            if (!workingDays.includes(dayOfWeek)) {
                Swal.fire({
                    icon: 'error',
                    title: isArabic ? 'العيادة مغلقة' : 'Clinic Closed',
                    text: isArabic ? 'لا يمكن حجز مواعيد في أيام العطل الرسمية.' : 'Appointments cannot be booked on holidays.',
                    confirmButtonColor: '#175cdd'
                });
                return;
            }
            
            if (clickedDateStart < todayStart) {
                Swal.fire({
                    icon: 'error',
                    title: isArabic ? 'تاريخ غير صالح' : 'Invalid Date',
                    text: isArabic ? 'لا يمكن حجز مواعيد في الماضي.' : 'Appointments cannot be booked in the past.',
                    confirmButtonColor: '#175cdd'
                });
                return;
            }
            
            const hasTime = info.dateStr.includes('T') || info.dateStr.includes(' ');
            if (hasTime && clickedDate < now) {
                Swal.fire({
                    icon: 'error',
                    title: isArabic ? 'وقت غير صالح' : 'Invalid Time',
                    text: isArabic ? 'الوقت المحدد في الماضي. يرجى اختيار وقت مستقبلي.' : 'Selected time is in the past. Please choose a future time.',
                    confirmButtonColor: '#175cdd'
                });
                return;
            }

            if (!hasTime) {
                calendar.changeView('timeGridWeek', info.dateStr);
                return;
            }

            const hours = clickedDate.getHours();
            const minutes = clickedDate.getMinutes();
            const timeVal = hours * 60 + minutes;
            const startVal = startHrs * 60 + startMins;
            const endVal = endHrs * 60 + endMins;
            if (timeVal < startVal || timeVal > endVal) {
                Swal.fire({
                    icon: 'error',
                    title: isArabic ? 'خارج ساعات العمل' : 'Outside Business Hours',
                    text: isArabic ? `يجب جدولة المواعيد بين ${workingHoursStart} و ${workingHoursEnd}.` : `Appointments must be scheduled between ${workingHoursStart} and ${workingHoursEnd}.`,
                    confirmButtonColor: '#175cdd'
                });
                return;
            }

            const maxDate = new Date(todayStart);
            maxDate.setDate(maxDate.getDate() + 30);
            maxDate.setHours(23, 59, 59, 999);
            if (clickedDate > maxDate) {
                Swal.fire({
                    icon: 'error',
                    title: isArabic ? 'تجاوز فترة الحجز' : 'Booking Period Exceeded',
                    text: isArabic ? 'لا يمكن حجز المواعيد قبل أكثر من 30 يوماً.' : 'Appointments cannot be booked more than 30 days in advance.',
                    confirmButtonColor: '#175cdd'
                });
                return;
            }

            const events = calendar.getEvents();
            let isOccupied = false;
            events.forEach(evt => {
                if (evt.start && evt.end) {
                    if (clickedDate >= evt.start && clickedDate < evt.end) {
                        isOccupied = true;
                    }
                }
            });

            if (isOccupied) {
                Swal.fire({
                    icon: 'error',
                    title: isArabic ? 'موعد محجوز' : 'Reserved Slot',
                    text: isArabic ? 'هذا الوقت محجوز بالفعل. يرجى اختيار وقت آخر.' : 'This slot is already reserved. Please select another time.',
                    confirmButtonColor: '#175cdd'
                });
                return;
            }

            const offsetDate = new Date(clickedDate.getTime() - clickedDate.getTimezoneOffset() * 60000);
            const dateParam = offsetDate.toISOString().substring(0, 16);

            const selectOptions = {};
            reasons.forEach(r => {
                let translated = r;
                if (isArabic && window.arabicTranslations && window.arabicTranslations[r]) {
                    translated = window.arabicTranslations[r];
                }
                selectOptions[r] = translated;
            });

            const formattedDate = clickedDate.toLocaleDateString(isArabic ? 'ar' : undefined);
            const formattedTime = clickedDate.toLocaleTimeString(isArabic ? 'ar' : undefined, {hour: '2-digit', minute:'2-digit'});

            Swal.fire({
                title: isArabic ? 'طلب حجز موعد جديد' : 'Request Appointment',
                html: `<p class="mb-3">${isArabic ? 'هل ترغب في طلب حجز موعد بالتاريخ والوقت المحددين؟' : 'Would you like to request a booking at the selected time?'}</p>
                       <div class="text-primary fw-bold mb-4 fs-5">${formattedDate} ${formattedTime}</div>`,
                input: 'select',
                inputOptions: selectOptions,
                inputPlaceholder: isArabic ? 'اختر سبب الحجز' : 'Select a Reason',
                showCancelButton: true,
                confirmButtonText: isArabic ? 'تقديم الطلب' : 'Submit Request',
                cancelButtonText: isArabic ? 'إلغاء' : 'Cancel',
                confirmButtonColor: '#175cdd',
                inputValidator: (value) => {
                    return new Promise((resolve) => {
                        if (value) {
                            resolve();
                        } else {
                            resolve(isArabic ? 'يجب اختيار سبب الحجز' : 'You must select a reason');
                        }
                    });
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: isArabic ? 'جاري إرسال الطلب...' : 'Submitting Request...',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    const formData = new URLSearchParams();
                    formData.append('appointment_date', dateParam);
                    formData.append('reason', result.value);

                    fetch("{{ url_for('portal.book_appointment') }}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: formData.toString()
                    })
                    .then(res => {
                        if (res.redirected) {
                            window.location.href = res.url;
                            return;
                        }
                        return res.text();
                    })
                    .then(html => {
                        window.location.href = "{{ url_for('portal.dashboard') }}";
                    })
                    .catch(err => {
                        console.error(err);
                        Swal.fire({
                            icon: 'error',
                            title: isArabic ? 'خطأ' : 'Error',
                            text: isArabic ? 'فشل تقديم الطلب. يرجى المحاولة مرة أخرى.' : 'Failed to request appointment. Please try again.',
                            confirmButtonColor: '#175cdd'
                        });
                    });
                }
            });
        }
    });

    calendar.render();
});
</script>
{% endblock %}
