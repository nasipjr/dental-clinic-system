{% extends "base.html" %}

{% block title %}Delete Visit{% endblock %}

{% block content %}
    <h1>Delete Visit</h1>

    <div class="info-box">
        <p>Are you sure you want to delete this visit?</p>
        <p>
            <strong>{{ visit.visit_date }}</strong> -
            {{ visit.procedure_type }} -
            Tooth: {{ visit.tooth_number }}
        </p>
    </div>

    <form method="POST">
        <button type="submit">Yes, Delete</button>
    </form>

    <br>
    <a class="button" href="/patients/{{ visit.patient_id }}">Cancel</a>
{% endblock %}
