<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Login - {{ clinic_name }}</title>
  
  <!-- Favicons -->
  <link href="{{ url_for('static', filename='assets/img/favicon.png') }}" rel="icon">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="{{ url_for('static', filename='assets/vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/vendor/bootstrap-icons/bootstrap-icons.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/main.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">

  <style>
    body.login-layout {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--default-font), sans-serif;
      color: #fff;
    }
    
    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 15px;
    }
    
    .login-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }
    
    .login-card:hover {
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 255, 255, 0.25);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }
    
    .login-header h2 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      font-family: var(--heading-font);
      margin-bottom: 8px;
    }
    
    .login-header p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }
    
    .login-form .form-label {
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .login-form .form-control {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .login-form .form-control:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: #66e0ff;
      box-shadow: 0 0 0 3px rgba(102, 224, 255, 0.25);
      outline: none;
      color: #fff;
    }
    
    .login-form .form-control::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    
    .btn-login {
      background-color: var(--accent-color) !important;
      border: 1px solid var(--accent-color) !important;
      color: var(--contrast-color) !important;
      padding: 12px 20px !important;
      border-radius: 12px !important;
      font-size: 15px !important;
      font-weight: 700 !important;
      width: 100%;
      margin-top: 15px;
      box-shadow: 0 6px 20px rgba(23, 92, 221, 0.3) !important;
    }
    
    .btn-login:hover {
      background-color: color-mix(in srgb, var(--accent-color), transparent 10%) !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 8px 25px rgba(23, 92, 221, 0.4) !important;
    }
    
    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: rgba(102, 224, 255, 0.15);
      border: 1px solid rgba(102, 224, 255, 0.3);
      color: #66e0ff;
      font-size: 28px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body class="login-layout">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <i class="bi bi-shield-lock"></i>
        </div>
        <h2>{{ clinic_name }}</h2>
        <p>Clinic Management System Portal</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show rounded-3 p-3 mb-4" role="alert" style="font-size: 13px; color: #fff; background-color: rgba(220, 53, 69, 0.2); border: 1px solid rgba(220, 53, 69, 0.3);">
              {{ message }}
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close" style="padding: 1rem;"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" class="login-form">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-login">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='assets/vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
</body>

</html>
