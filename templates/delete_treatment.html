{% extends "base.html" %}

{% block title %}Delete Treatment{% endblock %}

{% block content %}
<br><br><br><br><br><br><br>


<section id="delete-patient-page" class="section">
    <div class="container" data-aos="fade-up">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <div class="doctor-profile delete-patient-card text-center" data-aos="zoom-in" data-aos-delay="100">

                    <div class="delete-warning-icon">
                        <i class="bi bi-trash3"></i>
                    </div>

                    <div class="section-title small-section-title mb-4">
                        <h2>Delete Treatment</h2>
                        <p>This action cannot be undone.</p>
                    </div>

                    <div class="delete-patient-box">
                        <p>Are you sure you want to permanently delete this treatment?</p>
                        <h4>{{ treatment.treatment_date.replace('T', ' ') }}</h4>
                    </div>

                    <form method="POST" class="mt-4">
                        <div class="action-buttons justify-content-center gap-3">
                            <button type="submit" class="btn-delete-soft px-4">
                                Yes, Delete Treatment
                            </button>

                            <a href="{{ url_for('patient_detail', patient_id=treatment.patient_id) }}" class="btn-outline-main px-4">
                                Cancel
                            </a>
                        </div>
                    </form>

                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
